openapi: 3.0.3

info:
  title: GitHub Project Board Stats API
  version: 1.0.0
  description: >
    Backend service for querying GitHub Project board statistics through the GitHub MCP integration.
    All endpoints except /health require a valid JWT (x-jwt-assertion header injected by the Choreo gateway)
    and an identity verification parameter (x-authenticated-user header).

servers:
  - url: /

components:
  securitySchemes:
    jwtAssertion:
      type: apiKey
      in: header
      name: x-jwt-assertion
      description: JWT token assertions injected by the gateway wrapper.

security:
  - jwtAssertion: []

paths:
  /health:
    get:
      summary: Health check
      security: [] 
      responses:
        '200':
          description: Service is healthy and online.

  /query:
    post:
      summary: Query GitHub project releases
      parameters:
        - name: x-authenticated-user
          in: header
          required: true
          schema:
            type: string
            pattern: '^[a-zA-Z0-9_\-]+$'
          description: Authenticated user identifier used to match and preserve session records.
          example: "dev-user-123"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - question
              properties:
                question:
                  type: string
                  minLength: 1
                  pattern: '.*\S.*'
                  description: The query question to ask the AI agent about project releases.
                  example: "What were the releases from previous week?"
      responses:
        '200':
          description: Successful query resolution returning the iteration details and active release lists.
        '400':
          description: Invalid request payload or blank query.
        '401':
          description: Missing or invalid identity verification headers.
        '504':
          description: Target operations or internal GitHub MCP queries timed out (30s limit).
        '500':
          description: Internal server database or operational pipeline error.