openapi: 3.0.3
info:
  title: GitHub Product Download Stats Dashboard API
  version: 1.0.0
  description: >
    Backend-for-frontend for the GitHub Product Download Stats Dashboard. Reads pre-aggregated
    daily snapshots from the github_statistics MySQL database and shapes them for the
    React dashboard. All endpoints require a valid JWT (x-jwt-assertion header,
    injected by the Choreo gateway). Admin endpoints additionally require membership
    in a configured admin group.
servers:
  - url: /

components:
  securitySchemes:
    jwtAssertion:
      type: apiKey
      in: header
      name: x-jwt-assertion
  schemas:
    ErrorPayload:
      type: object
      properties:
        message:
          type: string
      required: [message]
    RepoSnapshot:
      type: object
      properties:
        snapshotDate: { type: string, format: date }
        totalDownloadCount: { type: integer, format: int64 }
        forksCount: { type: integer }
        stargazersCount: { type: integer }
        watchersCount: { type: integer }
        openIssuesCount: { type: integer }
        cloneCount: { type: integer }
        cloneUniques: { type: integer }
    RepositoryWithStats:
      type: object
      properties:
        id: { type: integer }
        orgName: { type: string }
        repoName: { type: string }
        productName: { type: string, nullable: true }
        assetPrefixes:
          type: array
          items: { type: string }
          maxItems: 50
        isActive: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        latestSnapshot:
          allOf: [{ $ref: '#/components/schemas/RepoSnapshot' }]
          nullable: true
    Summary:
      type: object
      properties:
        trackedRepositories: { type: integer }
        totalDownloads: { type: integer, format: int64 }
        totalStars: { type: integer }
        totalForks: { type: integer }
        totalClonesLast30d: { type: integer }
        totalClonesLast14d: { type: integer }
        todayDownloads: { type: integer, format: int64 }
        todayDeltaPct: { type: number, nullable: true }
        asOfDate: { type: string, format: date, nullable: true }
        monthDownloads: { type: integer, format: int64 }
        lastSyncDate: { type: string, format: date-time, nullable: true }
        lastSyncStatus: { type: string, nullable: true }
        topProducts:
          type: array
          items:
            type: object
            properties:
              repoId: { type: integer }
              repoName: { type: string }
              productName: { type: string, nullable: true }
              todayDownloads: { type: integer, format: int64 }
              totalDownloads: { type: integer, format: int64 }
              stars: { type: integer }
    TimeSeriesPoint:
      type: object
      properties:
        date: { type: string, format: date }
        value: { type: integer, format: int64 }
    RepoSeries:
      type: object
      properties:
        repoId: { type: integer }
        repoName: { type: string }
        points:
          type: array
          items: { $ref: '#/components/schemas/TimeSeriesPoint' }
    SeriesResponse:
      type: object
      properties:
        from: { type: string, format: date }
        to: { type: string, format: date }
        interval: { type: string, enum: [day, month, cumulative] }
        series:
          type: array
          items: { $ref: '#/components/schemas/RepoSeries' }
    MetricSeriesResponse:
      type: object
      properties:
        metric: { type: string, enum: [stars, forks, watchers, openIssues] }
        from: { type: string, format: date }
        to: { type: string, format: date }
        interval: { type: string, enum: [day, month, cumulative] }
        series:
          type: array
          items: { $ref: '#/components/schemas/RepoSeries' }
    ClonePoint:
      type: object
      properties:
        date: { type: string, format: date }
        count: { type: integer }
        uniques: { type: integer }
    CloneSeries:
      type: object
      properties:
        repoId: { type: integer }
        repoName: { type: string }
        points:
          type: array
          items: { $ref: '#/components/schemas/ClonePoint' }
    CloneSeriesResponse:
      type: object
      properties:
        from: { type: string, format: date }
        to: { type: string, format: date }
        series:
          type: array
          items: { $ref: '#/components/schemas/CloneSeries' }
    VersionBreakdown:
      type: object
      properties:
        repoId: { type: integer }
        snapshotDate: { type: string, format: date }
        versions:
          type: array
          items:
            type: object
            properties:
              releaseTag: { type: string }
              releaseName: { type: string, nullable: true }
              downloadCount: { type: integer, format: int64 }
    AssetBreakdown:
      type: object
      properties:
        repoId: { type: integer }
        snapshotDate: { type: string, format: date }
        version: { type: string, nullable: true }
        assets:
          type: array
          items:
            type: object
            properties:
              releaseTag: { type: string }
              assetName: { type: string }
              assetGithubId: { type: integer }
              contentType: { type: string, nullable: true }
              assetSize: { type: integer, format: int64, nullable: true }
              downloadCount: { type: integer, format: int64 }
    CompareResponse:
      type: object
      properties:
        from: { type: string, format: date }
        to: { type: string, format: date }
        items:
          type: array
          items:
            type: object
            properties:
              repoId: { type: integer }
              repoName: { type: string }
              totalDownloads: { type: integer, format: int64 }
              downloadsInRange: { type: integer, format: int64 }
              stars: { type: integer }
              forks: { type: integer }
              clonesInRange: { type: integer }
    NewRepository:
      type: object
      required: [orgName, repoName]
      properties:
        orgName: { type: string }
        repoName: { type: string }
        productName: { type: string, nullable: true }
        assetPrefixes:
          type: array
          items: { type: string }
          maxItems: 50
        isActive: { type: boolean }
    RepositoryUpdate:
      type: object
      properties:
        productName: { type: string, nullable: true }
        assetPrefixes:
          type: array
          items: { type: string }
          maxItems: 50
        isActive: { type: boolean }
    SyncLogsResponse:
      type: object
      properties:
        count: { type: integer }
        logs:
          type: array
          items:
            type: object
            properties:
              id: { type: integer, format: int64 }
              status: { type: string }
              reposSynced: { type: integer }
              reposFailed: { type: integer }
              errorMessage: { type: string, nullable: true }
              startedAt: { type: string, format: date-time }
              completedAt: { type: string, format: date-time, nullable: true }
              createdAt: { type: string, format: date-time }
  parameters:
    From:
      name: from
      in: query
      required: false
      schema: { type: string, format: date }
      description: Inclusive start date (YYYY-MM-DD). Defaults to 30 days ago.
    To:
      name: to
      in: query
      required: false
      schema: { type: string, format: date }
      description: Inclusive end date (YYYY-MM-DD). Defaults to today (UTC).
    Repos:
      name: repos
      in: query
      required: false
      schema: { type: string }
      description: Comma-separated tracked-repository ids to filter by.
    Interval:
      name: interval
      in: query
      required: false
      schema: { type: string, enum: [day, month, cumulative], default: day }
      description: Aggregation granularity. `day` (default) or `month`.
  responses:
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorPayload' }
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorPayload' }
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorPayload' }
    NotFound:
      description: Not Found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorPayload' }
    InternalServerError:
      description: Internal Server Error
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorPayload' }

security:
  - jwtAssertion: []

paths:
  /health:
    get:
      summary: Health check
      security: []
      responses:
        '200': { description: OK }
  /api/v1/user-info:
    get:
      summary: The signed-in caller's identity and privileges
      description: >
        isAdmin is computed server-side against the ADMIN_GROUPS environment
        variable, so the frontend can gate its Admin UI without knowing the
        admin group names.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  email: { type: string }
                  isAdmin: { type: boolean }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/InternalServerError' }
  /api/v1/repositories:
    get:
      summary: List tracked repositories with their latest stats
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  count: { type: integer }
                  repositories:
                    type: array
                    items: { $ref: '#/components/schemas/RepositoryWithStats' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/InternalServerError' }
  /api/v1/stats/summary:
    get:
      summary: Dashboard KPI summary
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Summary' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/InternalServerError' }
  /api/v1/stats/total:
    get:
      summary: Cumulative downloads per repository over time
      parameters:
        - $ref: '#/components/parameters/From'
        - $ref: '#/components/parameters/To'
        - $ref: '#/components/parameters/Repos'
        - $ref: '#/components/parameters/Interval'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SeriesResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/InternalServerError' }
  /api/v1/stats/daily:
    get:
      summary: Daily download deltas per repository (computed at read time)
      parameters:
        - $ref: '#/components/parameters/From'
        - $ref: '#/components/parameters/To'
        - $ref: '#/components/parameters/Repos'
        - $ref: '#/components/parameters/Interval'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SeriesResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/InternalServerError' }
  /api/v1/stats/metric:
    get:
      summary: Time series for a single GitHub stat (stars/forks/watchers/openIssues)
      description: >-
        interval=day/month return the actual change in the metric (gained or
        lost that day, or summed over the month) — not clamped to zero, since
        losing stars/forks/watchers or issues closing are real negative
        deltas. interval=cumulative returns the raw point-in-time value.
      parameters:
        - name: metric
          in: query
          required: true
          schema: { type: string, enum: [stars, forks, watchers, openIssues] }
          description: Which GitHub stat to return as a series.
        - $ref: '#/components/parameters/From'
        - $ref: '#/components/parameters/To'
        - $ref: '#/components/parameters/Repos'
        - $ref: '#/components/parameters/Interval'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MetricSeriesResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/InternalServerError' }
  /api/v1/stats/clones:
    get:
      summary: Clone traffic history per repository
      parameters:
        - $ref: '#/components/parameters/From'
        - $ref: '#/components/parameters/To'
        - $ref: '#/components/parameters/Repos'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CloneSeriesResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/InternalServerError' }
  /api/v1/stats/versions/{repoId}:
    get:
      summary: Download breakdown by release version
      parameters:
        - name: repoId
          in: path
          required: true
          schema: { type: integer }
        - $ref: '#/components/parameters/From'
        - $ref: '#/components/parameters/To'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/VersionBreakdown' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/InternalServerError' }
  /api/v1/stats/versions/{repoId}/series:
    get:
      summary: Per-version download time series (daily / monthly / cumulative)
      parameters:
        - name: repoId
          in: path
          required: true
          schema: { type: integer }
        - $ref: '#/components/parameters/From'
        - $ref: '#/components/parameters/To'
        - $ref: '#/components/parameters/Interval'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  repoId: { type: integer }
                  from: { type: string, format: date }
                  to: { type: string, format: date }
                  interval: { type: string, enum: [day, month, cumulative] }
                  series:
                    type: array
                    items:
                      type: object
                      properties:
                        releaseTag: { type: string }
                        releaseName: { type: string, nullable: true }
                        points:
                          type: array
                          items: { $ref: '#/components/schemas/TimeSeriesPoint' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/InternalServerError' }
  /api/v1/stats/assets/{repoId}:
    get:
      summary: Download breakdown by release asset
      description: >-
        downloadCount per asset is summed as daily deltas over from-to (same
        pattern as /stats/versions), not a single point-in-time cumulative
        snapshot — it relies on the date range the same way the Versions
        table/series does.
      parameters:
        - name: repoId
          in: path
          required: true
          schema: { type: integer }
        - $ref: '#/components/parameters/From'
        - $ref: '#/components/parameters/To'
        - name: version
          in: query
          required: false
          schema: { type: string }
          description: Optional release tag to filter assets to a single version.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AssetBreakdown' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/InternalServerError' }
  /api/v1/stats/compare:
    get:
      summary: Side-by-side comparison of repositories
      parameters:
        - $ref: '#/components/parameters/From'
        - $ref: '#/components/parameters/To'
        - name: repos
          in: query
          required: true
          schema: { type: string }
          description: Comma-separated tracked-repository ids to compare (at least one).
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CompareResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/InternalServerError' }
  /api/v1/admin/repositories:
    get:
      summary: List all tracked repositories incl. inactive (admin only)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  count: { type: integer }
                  repositories:
                    type: array
                    items: { $ref: '#/components/schemas/RepositoryWithStats' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/InternalServerError' }
    post:
      summary: Add a new tracked repository (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/NewRepository' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: integer }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/InternalServerError' }
  /api/v1/admin/repositories/{id}:
    patch:
      summary: Update a tracked repository's config (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RepositoryUpdate' }
      responses:
        '204': { description: No Content }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalServerError' }
    delete:
      summary: Deactivate a tracked repository (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '204': { description: No Content }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalServerError' }
  /api/v1/admin/sync/logs:
    get:
      summary: View sync job history (admin only)
      parameters:
        - name: limit
          in: query
          required: false
          schema: { type: integer, default: 50, maximum: 200 }
        - name: offset
          in: query
          required: false
          schema: { type: integer, default: 0 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SyncLogsResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/InternalServerError' }
